aid: cartography
name: Cartography
description: >-
  Cartography is an open-source Python security-graph tool originally built
  at Lyft that consolidates infrastructure assets and the relationships
  between them into an intuitive Neo4j graph. It ingests data from 30+
  cloud, identity, DevOps, and security providers (AWS, GCP, Azure, OCI,
  Okta, Entra ID, GitHub, Kubernetes, CrowdStrike, and more) and lets
  security teams answer cross-provider questions such as "which identities
  can reach which datastores," "which compute instances are exposed to the
  internet," and "what are the blast radii of a compromised credential."
type: Standard
position: Consumer
access: Open
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Security
  - Cloud Security
  - Graph
  - CSPM
  - Neo4j
  - Open Source
  - Lyft
  - Asset Inventory
  - Identity
created: '2025-01-01'
modified: '2026-04-23'
