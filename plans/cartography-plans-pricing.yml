    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Cartography. Includes dedicated capacity, contractual SLAs,
      security review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
